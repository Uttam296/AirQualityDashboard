<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌍 Air Quality Dashboard</h1>

    <div class="container">

        <div class="card">
            <h2>AQI</h2>
            <p id="aqi">--</p>
        </div>

        <div class="card">
            <h2>PM2.5</h2>
            <p id="pm25">--</p>
        </div>

        <div class="card">
            <h2>PM10</h2>
            <p id="pm10">--</p>
        </div>

        <div class="card">
            <h2>CO</h2>
            <p id="co">--</p>
        </div>

        <div class="card">
            <h2>NO₂</h2>
            <p id="no2">--</p>
        </div>

    </div>

    <button id="updateBtn">
        Show Air Quality
    </button>

    <script src="script.js"></script>

</body>
</html>
