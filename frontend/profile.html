<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <link rel="stylesheet" href="profile.css">

</head>

<body>

<div class="profile-card">

<div class="avatar">

👤

</div>

<h1>My Profile</h1>

<div class="info">

<div class="row">

<span class="label">Username</span>

<span class="value" id="username">Loading...</span>

</div>

<div class="row">

<span class="label">Email</span>

<span class="value" id="email">Loading...</span>

</div>

<div class="row">

<span class="label">Favorite Cities</span>

<span class="value" id="favorites">0</span>

</div>

<div class="row">

<span class="label">Total Searches</span>

<span class="value" id="searches">0</span>

</div>

</div>

<div class="buttons">

<button id="dashboardBtn">

🏠 Dashboard

</button>

<button id="logoutBtn">

🚪 Logout

</button>

</div>

</div>

<script src="profile.js"></script>

</body>

</html>
