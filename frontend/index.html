<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌍 Air Quality Dashboard</h1>

    <div class="search-box">

        <input
            type="text"
            id="cityInput"
            placeholder="Enter city name"
        >

        <button id="updateBtn">
            Search
        </button>

    </div>

    <div class="status-card">

        <h2>AQI Status</h2>

        <h1 id="aqiStatus">
            --
        </h1>

        <p id="recommendation">
            Search a city to get recommendations.
        </p>

    </div>

    <div class="container">

        <div class="card">
            <h2>AQI</h2>
            <p id="aqi">--</p>
        </div>

        <div class="card">
            <h2>PM2.5</h2>
            <p id="pm25">--</p>
        </div>

        <div class="card">
            <h2>PM10</h2>
            <p id="pm10">--</p>
        </div>

        <div class="card">
            <h2>CO</h2>
            <p id="co">--</p>
        </div>

        <div class="card">
            <h2>NO₂</h2>
            <p id="no2">--</p>
        </div>

    </div>
    <div class="chart-card">

    <h2>📊 Pollutants Comparison</h2>

    <canvas id="pollutionChart"></canvas>

</div>

    <script src="script.js"></script>

</body>
</html>
