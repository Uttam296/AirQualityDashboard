<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{

    margin:0;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
        135deg,
        #4facfe,
        #00f2fe
    );

    font-family:Arial,sans-serif;

}

.login-container{

    background:white;

    padding:40px;

    border-radius:20px;

    width:350px;

    text-align:center;

    box-shadow:
    0 10px 30px rgba(0,0,0,.2);

}

h1{

    color:#333;

}

input{

    width:90%;

    padding:12px;

    margin:10px 0;

    border-radius:10px;

    border:1px solid #ccc;

}

button{

    width:100%;

    padding:12px;

    border:none;

    border-radius:10px;

    background:#4facfe;

    color:white;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#2196f3;

}

</style>

</head>

<body>

<div class="login-container">

    <h1>🌍 AQI Login</h1>

    <input
    type="email"
    id="email"
    placeholder="Email">

    <input
    type="password"
    id="password"
    placeholder="Password">

    <button id="loginBtn">

        Login

    </button>

</div>

<script src="login.js"></script>

</body>
</html>
